# Observer Memory Quality Benchmark — Parallel Model Testing
# Run with: claw up -f claw-pod.yml
# Each service tests a different model/config against the same fixtures.

x-claw:
  pod: observer-bench

x-bench-common: &bench-common
  build:
    context: .
    dockerfile: Clawfile
  volumes:
    - ./fixtures:/bench/fixtures:ro
    - ./results:/bench/results

services:
  # Baseline: Gemini Flash (cheap, fast — current default)
  bench-gemini-flash:
    <<: *bench-common
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      CLAWVAULT_OBSERVER_PROVIDER: gemini
      CLAWVAULT_OBSERVER_MODEL: gemini-2.0-flash
      BENCH_RUN_ID: gemini-flash
    command: ["--output", "/bench/results/gemini-flash.json"]

  # Haiku (cheap alternative — test if quality holds)
  bench-haiku:
    <<: *bench-common
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAWVAULT_OBSERVER_PROVIDER: anthropic
      CLAWVAULT_OBSERVER_MODEL: claude-3-5-haiku-latest
      BENCH_RUN_ID: haiku
    command: ["--output", "/bench/results/haiku.json"]

  # Sonnet (expensive — is the quality jump worth it?)
  bench-sonnet:
    <<: *bench-common
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAWVAULT_OBSERVER_PROVIDER: anthropic
      CLAWVAULT_OBSERVER_MODEL: claude-sonnet-4-20250514
      BENCH_RUN_ID: sonnet
    command: ["--output", "/bench/results/sonnet.json"]

  # GPT-4o-mini (OpenAI cheap tier)
  bench-gpt4o-mini:
    <<: *bench-common
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      CLAWVAULT_OBSERVER_PROVIDER: openai
      CLAWVAULT_OBSERVER_MODEL: gpt-4o-mini
      BENCH_RUN_ID: gpt4o-mini
    command: ["--output", "/bench/results/gpt4o-mini.json"]

  # Ollama local (free — how bad is local?)
  bench-ollama:
    <<: *bench-common
    environment:
      CLAWVAULT_OBSERVER_PROVIDER: ollama
      CLAWVAULT_OBSERVER_MODEL: llama3.2
      CLAWVAULT_OBSERVER_BASE_URL: "http://host.docker.internal:11434/v1"
      BENCH_RUN_ID: ollama-llama3
    command: ["--output", "/bench/results/ollama-llama3.json"]

  # Comparison reporter — runs after all benchmarks complete
  reporter:
    <<: *bench-common
    depends_on:
      bench-gemini-flash:
        condition: service_completed_successfully
      bench-haiku:
        condition: service_completed_successfully
      bench-sonnet:
        condition: service_completed_successfully
      bench-gpt4o-mini:
        condition: service_completed_successfully
    entrypoint: ["clawvault", "benchmark", "compare",
      "--results-dir", "/bench/results",
      "--output", "/bench/results/comparison.md"]
