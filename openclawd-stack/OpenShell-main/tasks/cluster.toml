# Cluster bootstrap and deploy tasks

[cluster]
description = "Bootstrap or incremental deploy (creates cluster if needed, rebuilds changed components)"
run = "tasks/scripts/cluster.sh"

["cluster:build:full"]
description = "Build and deploy local k3s cluster with OpenShell"
depends = [
  "build:docker:gateway",
]
run = "tasks/scripts/cluster-bootstrap.sh build"
hide = true

["cluster:deploy"]
description = "Alias for cluster (incremental deploy)"
run = "tasks/scripts/cluster.sh"
hide = true

["cluster:deploy:supervisor"]
description = "Fast deploy supervisor binary changes (docker cp into cluster)"
run = "tasks/scripts/cluster-deploy-fast.sh supervisor"
hide = true

["cluster:deploy:all"]
description = "Pull-mode deploy using local registry pushes"
run = "tasks/scripts/cluster-deploy-fast.sh all"
hide = true

["cluster:push:gateway"]
description = "Tag and push gateway image to pull registry"
run = "tasks/scripts/cluster-push-component.sh gateway"
hide = true
