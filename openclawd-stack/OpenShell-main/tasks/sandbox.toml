# Sandbox tasks

[sandbox]
description = "Create or reconnect to the dev sandbox (redeploys cluster if dirty)"
raw = true
usage = """
arg "[command]" var=#true help="Command to run in the sandbox (default: claude)"
"""
run = "bash tasks/scripts/sandbox.sh"
