# Python development, build, lint, and format tasks

["python:dev"]
description = "Install Python package in development mode (builds CLI binary)"
depends = ["python:proto"]
run = "uv sync --group dev && uv pip install ."
hide = true

["build:python:wheel"]
description = "Build Python wheel with CLI binary (native)"
depends = ["python:proto"]
run = "uv run maturin build --release"
hide = true

["python:build"]
description = "Alias for build:python:wheel"
depends = ["build:python:wheel"]
hide = true

["build:python:wheel:linux"]
description = "Build a Linux Python wheel natively on the current host"
depends = ["python:proto"]
run = '''
#!/usr/bin/env bash
set -euo pipefail

WHEEL_OUTPUT_DIR=${WHEEL_OUTPUT_DIR:?Set WHEEL_OUTPUT_DIR to a per-platform wheel output directory}
EXPECTED_HOST_ARCH=${EXPECTED_HOST_ARCH:?Set EXPECTED_HOST_ARCH to amd64 or arm64}
ORIGINAL_CARGO_TOML=""

normalize_arch() {
  case "$1" in
    x86_64|amd64) echo amd64 ;;
    aarch64|arm64) echo arm64 ;;
    *) echo "$1" ;;
  esac
}

cleanup() {
  if [ -n "$ORIGINAL_CARGO_TOML" ] && [ -f "$ORIGINAL_CARGO_TOML" ]; then
    cp "$ORIGINAL_CARGO_TOML" Cargo.toml
    rm -f "$ORIGINAL_CARGO_TOML"
  fi
}

trap cleanup EXIT

if [ "$(uname -s)" != "Linux" ]; then
  echo "build:python:wheel:linux requires a Linux host" >&2
  exit 1
fi

HOST_ARCH=$(normalize_arch "$(uname -m)")
EXPECTED_HOST_ARCH=$(normalize_arch "$EXPECTED_HOST_ARCH")
if [ "$HOST_ARCH" != "$EXPECTED_HOST_ARCH" ]; then
  echo "build:python:wheel:linux expected ${EXPECTED_HOST_ARCH} host, got ${HOST_ARCH}" >&2
  exit 1
fi

# Avoid failures when RUSTC_WRAPPER is set to an unresolved `sccache` binary.
if command -v sccache >/dev/null 2>&1; then
  export RUSTC_WRAPPER="$(command -v sccache)"
else
  unset RUSTC_WRAPPER || true
fi

if [ -n "${OPENSHELL_CARGO_VERSION:-}" ]; then
  ORIGINAL_CARGO_TOML=$(mktemp)
  cp Cargo.toml "$ORIGINAL_CARGO_TOML"
  sed -i -E '/^\[workspace\.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*".*"/version = "'"${OPENSHELL_CARGO_VERSION}"'"/}' Cargo.toml
fi

rm -rf "$WHEEL_OUTPUT_DIR"
mkdir -p "$WHEEL_OUTPUT_DIR"

uv run maturin build --release --features bundled-z3 --out "$WHEEL_OUTPUT_DIR"

ls -la "$WHEEL_OUTPUT_DIR"/*.whl
'''
hide = true

["build:python:wheel:linux:amd64"]
description = "Build Python wheel for Linux amd64 natively"
depends = ["EXPECTED_HOST_ARCH=amd64 WHEEL_OUTPUT_DIR=target/wheels/linux-amd64 build:python:wheel:linux"]
hide = true

["python:build:linux:amd64"]
