# TUI tasks

[term]
description = "Launch the OpenShell TUI"
run = "openshell term"
hide = true

["term:dev"]
description = "Launch the OpenShell TUI with hot-reload on file changes"
run = "cargo watch -s 'openshell term'"
hide = true
