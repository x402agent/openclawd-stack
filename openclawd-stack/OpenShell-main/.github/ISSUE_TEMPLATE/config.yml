blank_issues_enabled: false
contact_links:
  - name: First-time contributor? Get vouched first
    url: https://github.com/NVIDIA/OpenShell/discussions/new?category=vouch-request
    about: >
      First-time contributors must be vouched before submitting PRs. Open a
      Vouch Request discussion describing what you want to work on. A
      maintainer will approve you with /vouch.
  - name: Have a question?
    url: https://github.com/NVIDIA/OpenShell/blob/main/CONTRIBUTING.md#agent-skills-for-contributors
    about: >
      Point your agent at the repo. It has skills for CLI usage, cluster and
      inference debugging, policy generation, and more. See CONTRIBUTING.md
      for the full skills table.
  - name: Security vulnerability?
    url: https://github.com/NVIDIA/OpenShell/blob/main/SECURITY.md
    about: >
      Do not report security vulnerabilities through GitHub issues. Follow
      the disclosure process in SECURITY.md — report through the NVIDIA PSIRT
      web form or email psirt@nvidia.com.
