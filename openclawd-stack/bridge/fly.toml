app = "cloud-clawd-bridge"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "npm install"

[env]
  E2B_API_KEY = "your-e2b-api-key-here"
  SANDBOX_TIMEOUT = "3600"
