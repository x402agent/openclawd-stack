<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PumpFun Swarm Bot — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--border:#2a2a3a;--text:#e0e0e8;--text2:#8888a0;--accent:#00ff88;--accent2:#00cc6a;--red:#ff4466;--orange:#ffaa33;--blue:#4488ff;--purple:#aa66ff;--font:system-ui,-apple-system,sans-serif;--mono:'SF Mono',Consolas,monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* Layout */
.app{display:grid;grid-template-rows:auto 1fr;height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
header h1{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
header h1 span{color:var(--text2);font-weight:400}
.conn-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s}
.conn-dot.connected{background:var(--accent)}

.main{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr 1fr;gap:16px;padding:16px;overflow:auto}
@media(max-width:1200px){.main{grid-template-columns:1fr}}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.card-body{padding:16px;overflow:auto;max-height:400px}

/* Stats Row */
.stats-row{grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:var(--accent);font-family:var(--mono)}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--text2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}

/* Status badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-running{background:rgba(0,255,136,.15);color:var(--accent)}
.badge-paused{background:rgba(255,170,51,.15);color:var(--orange)}
.badge-stopped{background:rgba(136,136,160,.15);color:var(--text2)}
.badge-error{background:rgba(255,68,102,.15);color:var(--red)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-accent{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);color:var(--bg)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:white}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* Create Bot Form */
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:end}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select{padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:var(--font);width:160px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}

/* Token Feed */
.token-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.token-item:last-child{border:none}
.token-symbol{font-weight:600;color:var(--accent);font-family:var(--mono);min-width:60px}
.token-name{color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.token-mcap{color:var(--text2);font-family:var(--mono);font-size:12px}

/* Log */
.log{font-family:var(--mono);font-size:12px;line-height:1.6;max-height:300px;overflow:auto}
.log-entry{padding:2px 0;border-bottom:1px solid rgba(42,42,58,.3)}
.log-time{color:var(--text2);margin-right:8px}
.log-info{color:var(--blue)}
.log-warn{color:var(--orange)}
.log-error{color:var(--red)}
.log-trade{color:var(--purple)}

/* Empty state */
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* Animation */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease-in-out infinite}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>PumpFun Swarm <span>v1.0</span></h1>
    <div style="display:flex;align-items:center;gap:20px">
      <div class="btn-group">
        <button class="btn btn-accent btn-sm" onclick="startAll()">▶ Start All</button>
        <button class="btn btn-sm" onclick="stopAll()">⏹ Stop All</button>
        <button class="btn btn-danger btn-sm" onclick="emergencyShutdown()">⚠ Emergency</button>
      </div>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">Connecting…</span>
      </div>
    </div>
  </header>

  <div class="main">
    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat"><div class="stat-value" id="statBots">0</div><div class="stat-label">Total Bots</div></div>
      <div class="stat"><div class="stat-value" id="statRunning">0</div><div class="stat-label">Running</div></div>
      <div class="stat"><div class="stat-value" id="statPositions">0</div><div class="stat-label">Open Positions</div></div>
      <div class="stat"><div class="stat-value" id="statMints">0</div><div class="stat-label">Tracked Mints</div></div>
      <div class="stat"><div class="stat-value" id="statTokens">0</div><div class="stat-label">Tokens Seen</div></div>
      <div class="stat"><div class="stat-value" id="statUptime">0s</div><div class="stat-label">Uptime</div></div>
    </div>

    <!-- Bots Table -->
    <div class="card" style="grid-column:1/-1">
      <div class="card-header">
        <h2>Bots</h2>
        <button class="btn btn-accent btn-sm" onclick="toggleCreate()">+ New Bot</button>
      </div>
      <div class="card-body">
        <!-- Create Form (hidden by default) -->
        <div id="createForm" style="display:none;margin-bottom:16px;padding:16px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
          <div class="form-row">
            <div class="form-group">
              <label>Name</label>
              <input id="cfName" placeholder="My Sniper Bot" maxlength="50">
            </div>
            <div class="form-group">
              <label>Strategy</label>
              <select id="cfStrategy">
                <option value="sniper">Sniper</option>
                <option value="momentum">Momentum</option>
                <option value="graduation">Graduation</option>
                <option value="market-maker">Market Maker</option>
              </select>
            </div>
            <div class="form-group">
              <label>Max Buy (SOL)</label>
              <input id="cfMaxBuy" type="number" value="1" min="0.01" step="0.1">
            </div>
            <div class="form-group">
              <label>Max Positions</label>
              <input id="cfMaxPos" type="number" value="5" min="1" step="1">
            </div>
            <div class="form-group">
              <label>Slippage (BPS)</label>
              <input id="cfSlippage" type="number" value="500" min="1" step="50">
            </div>
            <div class="form-group" style="justify-content:end">
              <button class="btn btn-accent" onclick="createBot()">Create Bot</button>
            </div>
          </div>
        </div>

        <table>
          <thead><tr>
            <th>Name</th>
            <th>Strategy</th>
            <th>Status</th>
            <th>Wallet</th>
            <th>Positions</th>
            <th>Tracked</th>
            <th>Actions</th>
          </tr></thead>
          <tbody id="botsTable">
            <tr><td colspan="7" class="empty">No bots created yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Token Feed -->
    <div class="card">
      <div class="card-header">
        <h2>Token Feed</h2>
        <span style="font-size:12px;color:var(--text2)" id="feedCount">0 tokens</span>
      </div>
      <div class="card-body" id="tokenFeed">
        <div class="empty">Waiting for tokens…</div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="card">
      <div class="card-header">
        <h2>Activity Log</h2>
        <button class="btn btn-sm" onclick="clearLog()">Clear</button>
      </div>
      <div class="card-body log" id="activityLog">
        <div class="empty">No activity yet</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let ws = null;
let reconnectTimer = null;
let reconnectDelay = 1000;
const MAX_LOG_ENTRIES = 200;
const MAX_TOKENS = 100;
let logEntries = [];
let tokenEntries = [];

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('connDot').classList.add('connected');
    document.getElementById('connText').textContent = 'Connected';
    reconnectDelay = 1000;
    addLog('info', 'Connected to swarm server');
  };

  ws.onclose = () => {
    document.getElementById('connDot').classList.remove('connected');
    document.getElementById('connText').textContent = 'Reconnecting…';
    scheduleReconnect();
  };

  ws.onerror = () => {
    ws.close();
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch {}
  };
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
    connect();
  }, reconnectDelay);
}

function sendWs(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

// ── Message Handler ──────────────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'state':
      updateState(msg.data);
      break;
    case 'token':
      addToken(msg.data);
      break;
    case 'price':
      // Price updates handled via state refresh
      break;
    case 'bot:event':
      addLog('info', `Bot event: ${msg.event} ${msg.data?.id ? '(' + msg.data.id.slice(0,8) + '…)' : ''}`);
      break;
    case 'trade':
      addLog('trade', `Trade: ${msg.data?.side?.toUpperCase()} ${msg.data?.mint?.slice(0,8)}…`);
      break;
    case 'pong':
      break;
  }
}

// ── State Update ─────────────────────────────────────────────────────────────
function updateState(data) {
  if (!data) return;
  const s = data.stats || {};
  document.getElementById('statBots').textContent = s.totalBots ?? 0;
  document.getElementById('statRunning').textContent = s.runningBots ?? 0;
  document.getElementById('statPositions').textContent = s.totalOpenPositions ?? 0;
  document.getElementById('statMints').textContent = s.totalTrackedMints ?? 0;
  document.getElementById('statTokens').textContent = data.tokenFeedSeen ?? 0;
  document.getElementById('statUptime').textContent = formatUptime(data.uptime ?? 0);

  renderBots(data.bots || []);
}

function renderBots(bots) {
  const tbody = document.getElementById('botsTable');
  if (bots.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No bots created yet</td></tr>';
    return;
  }

  tbody.innerHTML = bots.map(b => `
    <tr>
      <td><strong>${esc(b.name)}</strong></td>
      <td style="font-family:var(--mono);font-size:12px">${esc(b.strategy)}</td>
      <td><span class="badge badge-${b.status}">${b.status}</span></td>
      <td style="font-family:var(--mono);font-size:11px">${b.walletPubkey ? b.walletPubkey.slice(0,8)+'…' : '—'}</td>
      <td>${b.openPositions}</td>
      <td>${b.trackedMints}</td>
      <td>
        <div class="btn-group">
          ${b.status === 'running'
            ? `<button class="btn btn-sm" onclick="pauseBot('${b.id}')">⏸</button>
               <button class="btn btn-sm btn-danger" onclick="stopBot('${b.id}')">⏹</button>`
            : b.status === 'paused'
            ? `<button class="btn btn-sm btn-accent" onclick="resumeBot('${b.id}')">▶</button>
               <button class="btn btn-sm btn-danger" onclick="stopBot('${b.id}')">⏹</button>`
            : `<button class="btn btn-sm btn-accent" onclick="startBot('${b.id}')">▶</button>
               <button class="btn btn-sm btn-danger" onclick="deleteBot('${b.id}')">🗑</button>`
          }
        </div>
      </td>
    </tr>
  `).join('');
}

// ── Token Feed ───────────────────────────────────────────────────────────────
function addToken(data) {
  tokenEntries.unshift(data);
  if (tokenEntries.length > MAX_TOKENS) tokenEntries.pop();
  renderTokenFeed();
  document.getElementById('feedCount').textContent = `${tokenEntries.length} tokens`;
}

function renderTokenFeed() {
  const el = document.getElementById('tokenFeed');
  el.innerHTML = tokenEntries.map(t => `
    <div class="token-item">
      <span class="token-symbol">${esc(t.symbol || '???')}</span>
      <span class="token-name">${esc(t.name || t.mint)}</span>
      <span class="token-mcap">${t.marketCapSol ? t.marketCapSol.toFixed(1) + ' SOL' : '—'}</span>
    </div>
  `).join('');
}

// ── Activity Log ─────────────────────────────────────────────────────────────
function addLog(level, text) {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour12: false });
  logEntries.unshift({ time, level, text });
  if (logEntries.length > MAX_LOG_ENTRIES) logEntries.pop();
  renderLog();
}

function renderLog() {
  const el = document.getElementById('activityLog');
  el.innerHTML = logEntries.map(e => `
    <div class="log-entry">
      <span class="log-time">${e.time}</span>
      <span class="log-${e.level}">${esc(e.text)}</span>
    </div>
  `).join('');
}

function clearLog() {
  logEntries = [];
  document.getElementById('activityLog').innerHTML = '<div class="empty">No activity yet</div>';
}

// ── Bot Actions ──────────────────────────────────────────────────────────────
async function createBot() {
  const name = document.getElementById('cfName').value.trim();
  const strategy = document.getElementById('cfStrategy').value;
  const maxBuySol = parseFloat(document.getElementById('cfMaxBuy').value) || 1;
  const maxPositions = parseInt(document.getElementById('cfMaxPos').value) || 5;
  const slippageBps = parseInt(document.getElementById('cfSlippage').value) || 500;

  if (!name) { alert('Name is required'); return; }

  try {
    const res = await fetch('/api/bots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, strategy, maxBuySol, maxPositions, slippageBps }),
    });
    const data = await res.json();
    if (res.ok) {
      addLog('info', `Bot created: ${name} (${data.id?.slice(0,8)}…)`);
      document.getElementById('cfName').value = '';
      document.getElementById('createForm').style.display = 'none';
    } else {
      addLog('error', `Create failed: ${data.error}`);
    }
  } catch (e) {
    addLog('error', `Create failed: ${e.message}`);
  }
}

function startBot(id) { apiPost(`/api/bots/${id}/start`); }
function pauseBot(id) { apiPost(`/api/bots/${id}/pause`); }
function resumeBot(id) { apiPost(`/api/bots/${id}/resume`); }
function stopBot(id) { apiPost(`/api/bots/${id}/stop`); }
function deleteBot(id) {
  if (confirm('Delete this bot? This cannot be undone.')) {
    apiFetch(`/api/bots/${id}`, 'DELETE');
  }
}
function startAll() { apiPost('/api/swarm/start-all'); }
function stopAll() { apiPost('/api/swarm/stop-all'); }
function emergencyShutdown() {
  if (confirm('EMERGENCY SHUTDOWN — This will sell all positions and stop all bots. Continue?')) {
    apiPost('/api/swarm/emergency-shutdown');
  }
}

async function apiPost(url) {
  try {
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) addLog('error', data.error || 'Request failed');
  } catch (e) {
    addLog('error', e.message);
  }
}

async function apiFetch(url, method = 'GET') {
  try {
    const res = await fetch(url, { method });
    const data = await res.json();
    if (!res.ok) addLog('error', data.error || 'Request failed');
  } catch (e) {
    addLog('error', e.message);
  }
}

function toggleCreate() {
  const el = document.getElementById('createForm');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (el.style.display === 'block') {
    document.getElementById('cfName').focus();
  }
}

// ── Utilities ────────────────────────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

function formatUptime(sec) {
  if (sec < 60) return Math.floor(sec) + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
  return Math.floor(sec/86400) + 'd ' + Math.floor((sec%86400)/3600) + 'h';
}

// ── Ping ─────────────────────────────────────────────────────────────────────
setInterval(() => { sendWs({ type: 'ping' }); }, 30000);

// ── Init ─────────────────────────────────────────────────────────────────────
connect();
addLog('info', 'Dashboard initialized');
</script>
</body>
</html>
